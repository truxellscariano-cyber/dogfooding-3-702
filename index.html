<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 太阳系模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 30, 0.9);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            max-width: 320px;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #info-panel h3 {
            margin-bottom: 12px;
            color: #ffd700;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        #info-panel p {
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.6;
            color: #e0e0e0;
        }

        #planet-description {
            font-style: italic;
            color: #b0b0b0;
        }

        #planet-details {
            font-size: 13px;
            color: #909090;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
            margin-top: 10px;
        }

        #controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 30, 0.8);
            color: #aaa;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.2);
        }

        #title {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: 300;
            z-index: 100;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
            letter-spacing: 2px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="title">太阳系模拟器</div>
    
    <div id="info-panel">
        <button class="close-btn" onclick="document.getElementById('info-panel').style.display='none'">&times;</button>
        <h3 id="planet-name"></h3>
        <p id="planet-description"></p>
        <p id="planet-details"></p>
    </div>
    
    <div id="controls-hint">
        🖱️ 拖拽旋转视角 | 滚轮缩放 | 点击天体查看信息
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
